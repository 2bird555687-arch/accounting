version: "3.9"

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  acccloud:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  data:          # SQLite database files (data/firm_*/company_*/db.sqlite)
  backups:       # Daily backup archives
  static:        # Static assets served by nginx
  nginx_logs:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── FastAPI application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: acccloud:latest
    container_name: acccloud_app
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - data:/app/data               # SQLite files persist here
      - static:/app/app/static       # shared with nginx
    expose:
      - "8000"
    networks:
      - acccloud
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: acccloud_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static:/app/static:ro            # served directly by nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro    # SSL certs (Certbot / manual)
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - acccloud
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Daily SQLite backup ────────────────────────────────────────────────────
  backup:
    image: alpine:3.19
    container_name: acccloud_backup
    restart: unless-stopped
    volumes:
      - data:/app/data:ro
      - backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: |
      sh -c "
        echo '0 2 * * * sh /backup.sh' | crontab - &&
        crond -f -l 6
      "
    networks:
      - acccloud
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"
