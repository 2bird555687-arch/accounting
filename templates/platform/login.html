{% extends "platform/base_minimal.html" %}
{% block title %}เข้าสู่ระบบ — AccCloud{% endblock %}

{% block content %}
<div class="w-full max-w-md" x-data="loginPage()">

  <div class="bg-white rounded-2xl shadow-lg p-8">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-blue-700 rounded-2xl flex items-center justify-center mb-3">
        <i class="ti ti-calculator text-white text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">AccCloud</h1>
      <p class="text-sm text-gray-500 mt-1">{{ firm_name | default("ระบบบัญชีออนไลน์") }}</p>
    </div>

    <!-- Error -->
    <div x-show="error" x-cloak
         class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2">
      <i class="ti ti-alert-circle text-base shrink-0"></i>
      <span x-text="error"></span>
    </div>

    <!-- Form -->
    <div class="space-y-4">

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
        <input type="text" x-model="username" @keyup.enter="submit()"
               autocomplete="username" placeholder="username" autofocus
               class="w-full px-3 py-2.5 rounded-lg border border-gray-300
                      focus:outline-none focus:ring-2 focus:ring-blue-500
                      focus:border-transparent text-sm" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
        <div class="relative">
          <input :type="showPw ? 'text' : 'password'"
                 x-model="password" @keyup.enter="submit()"
                 autocomplete="current-password" placeholder="••••••••"
                 class="w-full px-3 py-2.5 pr-10 rounded-lg border border-gray-300
                        focus:outline-none focus:ring-2 focus:ring-blue-500
                        focus:border-transparent text-sm" />
          <button type="button" @click="showPw=!showPw"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i :class="showPw ? 'ti ti-eye-off' : 'ti ti-eye'" class="text-base"></i>
          </button>
        </div>
      </div>

      <!-- Remember me -->
      <div class="flex items-center gap-2">
        <input id="remember" type="checkbox" x-model="remember"
               class="h-4 w-4 rounded border-gray-300 text-blue-600" />
        <label for="remember" class="text-sm text-gray-600 cursor-pointer">จำการเข้าสู่ระบบ</label>
      </div>

      <!-- Submit -->
      <button @click="submit()" :disabled="loading"
              class="w-full py-2.5 px-4 bg-blue-700 hover:bg-blue-800
                     disabled:opacity-60 disabled:cursor-not-allowed
                     text-white font-semibold rounded-lg transition-colors
                     text-sm flex items-center justify-center gap-2">
        <i x-show="loading" class="ti ti-loader spin text-base"></i>
        <i x-show="!loading" class="ti ti-login text-base"></i>
        <span x-text="loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'"></span>
      </button>

    </div>
  </div>

  <p class="text-center text-xs text-gray-400 mt-4">AccCloud &copy; 2026</p>
</div>

<script>
function loginPage() {
  return {
    username: '', password: '', remember: false,
    loading: false, error: '', showPw: false,

    async submit() {
      if (!this.username.trim() || !this.password) {
        this.error = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; return;
      }
      this.loading = true; this.error = '';
      try {
        const data = await api('POST', '/api/v1/auth/login', {
          username: this.username, password: this.password,
        });
        const token = data?.access_token || data?.data?.access_token;
        if (token) {
          const maxAge = this.remember ? 86400 * 30 : 86400;
          document.cookie = `access_token=${token}; path=/; SameSite=Lax; max-age=${maxAge}`;
        }
        window.location.href = '/select-context';
      } catch(e) {
        this.error = e.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
      } finally {
        this.loading = false;
      }
    }
  }
}
</script>
{% endblock %}
