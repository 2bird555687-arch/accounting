<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ — AccCloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center" x-data="{ loading: false }">

<div class="w-full max-w-md">
  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-lg p-8">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-blue-700 rounded-2xl flex items-center justify-center mb-3">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19V7a2 2 0 012-2h12a2 2 0 012 2v12a4 4 0 01-4 4H8a4 4 0 01-4-4z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">AccCloud</h1>
      <p class="text-sm text-gray-500 mt-1">ระบบบัญชีออนไลน์</p>
    </div>

    <!-- Error -->
    {% if error %}
    <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="post" action="/login" @submit="loading = true" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
        <input
          type="text" name="username" required autocomplete="username"
          class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
          placeholder="username"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
        <input
          type="password" name="password" required autocomplete="current-password"
          class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
          placeholder="••••••••"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Company ID</label>
          <input
            type="number" name="company_id" value="1" min="1"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Branch ID</label>
          <input
            type="number" name="branch_id" value="1" min="1"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full py-2.5 px-4 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg transition-colors text-sm flex items-center justify-center gap-2 disabled:opacity-60"
        :disabled="loading"
      >
        <svg x-show="loading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span x-text="loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'"></span>
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-gray-400 mt-4">AccCloud &copy; 2026</p>
</div>
</body>
</html>
