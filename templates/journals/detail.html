{% extends "base.html" %}
{% block title %}รายละเอียดสมุดรายวัน{% endblock %}
{% block page_title %}สมุดรายวัน / {{ entry_no }}{% endblock %}

{% block content %}
<div x-data="journalDetail('{{ entry_no }}')" x-init="init()">

  <!-- Back -->
  <div class="mb-4">
    <a href="/journals" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      กลับสมุดรายวัน
    </a>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100 text-center text-gray-400">
      <svg class="animate-spin w-8 h-8 mx-auto" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>
  </template>

  <template x-if="!loading && entry">
    <div class="space-y-4">
      <!-- Header Card -->
      <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">เลขที่</p>
            <p class="font-mono font-bold text-blue-700 text-lg" x-text="entry.entry_no"></p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">วันที่</p>
            <p class="font-medium text-gray-800" x-text="entry.entry_date"></p>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">ประเภท</p>
            <span class="inline-flex px-2 py-0.5 rounded bg-gray-100 text-gray-700 text-sm font-medium" x-text="entry.journal_type"></span>
          </div>
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">สถานะ</p>
            <span
              :class="entry.status === 'posted' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
              class="inline-flex px-2 py-0.5 rounded-full text-sm font-medium"
              x-text="entry.status === 'posted' ? 'บันทึกแล้ว' : entry.status"
            ></span>
          </div>
        </div>
        <div class="mt-4 pt-4 border-t border-gray-100">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">คำอธิบาย</p>
          <p class="text-gray-800" x-text="entry.description"></p>
        </div>
        <div x-show="entry.reference" class="mt-2">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">อ้างอิง</p>
          <p class="text-gray-700 font-mono text-sm" x-text="entry.reference"></p>
        </div>
      </div>

      <!-- Lines Table -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100">
          <h2 class="font-semibold text-gray-800">รายการบัญชี</h2>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="text-left px-4 py-3 font-medium text-gray-600">รหัสบัญชี</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">ชื่อบัญชี</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">คำอธิบาย</th>
              <th class="text-right px-4 py-3 font-medium text-gray-600">เดบิต</th>
              <th class="text-right px-4 py-3 font-medium text-gray-600">เครดิต</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(line, i) in entry.lines" :key="i">
              <tr class="border-b border-gray-50">
                <td class="px-4 py-3 font-mono text-gray-700" x-text="line.account_code"></td>
                <td class="px-4 py-3 text-gray-800" x-text="line.account_name || line.account_code"></td>
                <td class="px-4 py-3 text-gray-500 text-xs" x-text="line.description || '—'"></td>
                <td class="px-4 py-3 text-right font-mono" x-text="line.debit_amount > 0 ? fmt(line.debit_amount) : ''"></td>
                <td class="px-4 py-3 text-right font-mono" x-text="line.credit_amount > 0 ? fmt(line.credit_amount) : ''"></td>
              </tr>
            </template>
          </tbody>
          <tfoot class="bg-gray-50 border-t-2 border-gray-200 font-semibold">
            <tr>
              <td colspan="3" class="px-4 py-3 text-right text-gray-600">รวม</td>
              <td class="px-4 py-3 text-right font-mono text-gray-800" x-text="fmt(entry.total_debit)"></td>
              <td class="px-4 py-3 text-right font-mono text-gray-800" x-text="fmt(entry.total_credit)"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </template>

</div>
{% endblock %}

{% block scripts %}
<script>
function journalDetail(entryNo) {
  return {
    entry: null,
    loading: true,

    async init() {
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      try {
        const resp = await fetch('/api/v1/journals/' + entryNo, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await resp.json();
        this.entry = data.data || data;
      } catch {
        this.entry = null;
      }
      this.loading = false;
    },

    fmt(v) {
      return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0);
    },
  };
}
</script>
{% endblock %}
