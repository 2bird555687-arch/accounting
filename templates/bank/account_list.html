{% extends "base.html" %}
{% block title %}บัญชีธนาคาร{% endblock %}
{% block page_title %}ธนาคาร — บัญชีธนาคาร{% endblock %}

{% block content %}
<div x-data="bankAccountList()" x-init="init()">

  <!-- Stat cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
      <div class="text-xs text-gray-500">จำนวนบัญชี</div>
      <div class="text-2xl font-bold text-gray-800" x-text="items.length"></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
      <div class="text-xs text-gray-500">ยอดคงเหลือรวม</div>
      <div class="text-2xl font-bold" style="color:var(--accent)" x-text="fmt(totalBalance())"></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
      <div class="text-xs text-gray-500">เงินสดในมือ</div>
      <div class="text-2xl font-bold text-gray-800" x-text="fmt(cashOnHand())"></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="flex items-center justify-end mb-4">
    <button @click="openCreate()"
      class="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1"
      style="background:var(--accent-l);color:var(--accent);border:1px solid var(--accent);">
      ➕ เพิ่มบัญชี
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-4 py-3 font-medium text-gray-600">ธนาคาร</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">เลขบัญชี</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">ชื่อบัญชี</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">ประเภท</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">COA</th>
          <th class="text-right px-4 py-3 font-medium text-gray-600">ยอดคงเหลือ</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">กำลังโหลด...</td></tr>
        </template>
        <template x-if="!loading && items.length === 0">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">ยังไม่มีบัญชีธนาคาร</td></tr>
        </template>
        <template x-for="a in items" :key="a.id">
          <tr class="border-b border-gray-50 hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-700 font-medium" x-text="a.bank_name"></td>
            <td class="px-4 py-3 font-mono text-gray-600" x-text="a.account_number || '-'"></td>
            <td class="px-4 py-3 text-gray-600" x-text="a.account_name || '-'"></td>
            <td class="px-4 py-3 text-center">
              <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700"
                x-text="typeLabel(a.account_type)"></span>
            </td>
            <td class="px-4 py-3 text-center font-mono text-blue-600" x-text="a.coa_account_code"></td>
            <td class="px-4 py-3 text-right font-mono font-medium" x-text="fmt(a.balance)"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Create Modal -->
  <div x-show="showCreate" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
       @click.self="showCreate=false">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
      <h2 class="text-lg font-bold mb-4">เพิ่มบัญชีธนาคาร</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">ชื่อธนาคาร</label>
          <input x-model="form.bank_name" list="thai-banks-list" placeholder="เลือกหรือพิมพ์ชื่อธนาคาร..."
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          <datalist id="thai-banks-list">
            <option value="ธนาคารกรุงเทพ (BBL)">
            <option value="ธนาคารกสิกรไทย (KBANK)">
            <option value="ธนาคารกรุงไทย (KTB)">
            <option value="ธนาคารไทยพาณิชย์ (SCB)">
            <option value="ธนาคารกรุงศรีอยุธยา (BAY)">
            <option value="ธนาคารทหารไทยธนชาต (TTB)">
            <option value="ธนาคารเกียรตินาคินภัทร (KKP)">
            <option value="ธนาคารซีไอเอ็มบีไทย (CIMBT)">
            <option value="ธนาคารยูโอบี (UOB)">
            <option value="ธนาคารออมสิน (GSB)">
            <option value="ธนาคารอาคารสงเคราะห์ (GHB)">
            <option value="ธนาคารเพื่อการเกษตรและสหกรณ์การเกษตร (BAAC)">
            <option value="ธนาคารอิสลามแห่งประเทศไทย (iBank)">
            <option value="ธนาคารไทยเครดิต (CREDIT)">
          </datalist>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">เลขที่บัญชี</label>
            <input x-model="form.account_number" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">ชื่อบัญชี</label>
            <input x-model="form.account_name" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">ประเภท</label>
            <select x-model="form.account_type" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
              <option value="current">กระแสรายวัน</option>
              <option value="savings">ออมทรัพย์</option>
              <option value="cash">เงินสด</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">รหัสบัญชี COA</label>
            <input x-model="form.coa_account_code" placeholder="เช่น 1102"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm font-mono"/>
          </div>
        </div>
        <p x-show="error" x-text="error" class="text-sm text-red-600"></p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="showCreate=false" class="px-4 py-2 rounded-lg border border-gray-200 text-sm">ยกเลิก</button>
        <button @click="save()" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm">บันทึก</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function bankAccountList() {
  return {
    items: [], loading: false, showCreate: false, error: '', form: {},
    token() { return document.cookie.match(/access_token=([^;]+)/)?.[1] || ''; },
    async init() { await this.load(); },
    async load() {
      this.loading = true;
      try {
        const r = await fetch('/api/v1/bank/accounts', { headers: { Authorization: 'Bearer ' + this.token() } });
        const d = await r.json();
        this.items = d.data || d.items || d || [];
      } catch { this.items = []; }
      this.loading = false;
    },
    totalBalance() { return this.items.reduce((s, a) => s + Number(a.balance || 0), 0); },
    cashOnHand() { return this.items.filter(a => a.account_type === 'cash').reduce((s, a) => s + Number(a.balance || 0), 0); },
    typeLabel(t) { return { current: 'กระแสรายวัน', savings: 'ออมทรัพย์', cash: 'เงินสด' }[t] || t; },
    openCreate() {
      this.error = '';
      this.form = { bank_name: '', account_number: '', account_name: '', account_type: 'current', coa_account_code: '' };
      this.showCreate = true;
    },
    async save() {
      this.error = '';
      if (!this.form.bank_name || !this.form.coa_account_code) { this.error = 'กรุณากรอกชื่อธนาคารและรหัส COA'; return; }
      try {
        const r = await fetch('/api/v1/bank/accounts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + this.token() },
          body: JSON.stringify(this.form),
        });
        if (!r.ok) { const d = await r.json(); this.error = d.detail || 'บันทึกไม่สำเร็จ'; return; }
        this.showCreate = false;
        await this.load();
      } catch (e) { this.error = String(e); }
    },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
