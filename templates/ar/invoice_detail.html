{% extends "base.html" %}
{% block title %}ใบแจ้งหนี้{% endblock %}
{% block page_title %}AR — ใบแจ้งหนี้ #{{ invoice_id }}{% endblock %}

{% block content %}
<div x-data="invDetail({{ invoice_id }})" x-init="init()">

  <div class="mb-4 flex items-center justify-between">
    <a href="/ar/invoices" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      กลับรายการ
    </a>
    <div class="flex gap-2" x-show="inv && inv.balance_due > 0">
      <a :href="'/ar/receipts/new?invoice_id=' + invoiceId"
        class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">
        รับชำระเงิน
      </a>
    </div>
  </div>

  <template x-if="loading">
    <div class="bg-white rounded-xl p-8 shadow-sm text-center text-gray-400">
      <svg class="animate-spin w-8 h-8 mx-auto" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>
  </template>

  <template x-if="!loading && inv">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Invoice card -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <!-- Header info -->
        <div class="flex items-start justify-between mb-6">
          <div>
            <h2 class="text-2xl font-bold text-gray-800" x-text="inv.invoice_no"></h2>
            <p class="text-gray-500 mt-1" x-text="inv.contact_name"></p>
          </div>
          <span :class="statusClass(inv.status)" class="px-3 py-1 rounded-full text-sm font-medium" x-text="statusLabel(inv.status)"></span>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6 text-sm">
          <div>
            <p class="text-gray-400 mb-1">วันที่ออก</p>
            <p class="font-medium" x-text="inv.invoice_date"></p>
          </div>
          <div>
            <p class="text-gray-400 mb-1">ครบกำหนด</p>
            <p class="font-medium" :class="isOverdue() ? 'text-red-600' : ''" x-text="inv.due_date"></p>
          </div>
          <div>
            <p class="text-gray-400 mb-1">อ้างอิง</p>
            <p class="font-medium" x-text="inv.reference || '—'"></p>
          </div>
        </div>

        <!-- Lines -->
        <table class="w-full text-sm border-t border-gray-100">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="text-left py-2 text-gray-500 font-medium">รายการ</th>
              <th class="text-right py-2 text-gray-500 font-medium">จำนวน</th>
              <th class="text-right py-2 text-gray-500 font-medium">ราคา</th>
              <th class="text-right py-2 text-gray-500 font-medium">รวม</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(l, i) in inv.lines" :key="i">
              <tr class="border-b border-gray-50">
                <td class="py-2 text-gray-700" x-text="l.description"></td>
                <td class="py-2 text-right text-gray-600" x-text="l.quantity"></td>
                <td class="py-2 text-right font-mono text-gray-600" x-text="fmt(l.unit_price)"></td>
                <td class="py-2 text-right font-mono text-gray-800" x-text="fmt(l.amount)"></td>
              </tr>
            </template>
          </tbody>
          <tfoot>
            <tr class="border-t border-gray-200">
              <td colspan="3" class="py-2 text-right text-gray-500">ยอดก่อนภาษี</td>
              <td class="py-2 text-right font-mono" x-text="fmt(inv.subtotal)"></td>
            </tr>
            <tr>
              <td colspan="3" class="py-2 text-right text-gray-500" x-text="'VAT ' + (inv.vat_rate||0) + '%'"></td>
              <td class="py-2 text-right font-mono" x-text="fmt(inv.vat_amount)"></td>
            </tr>
            <tr class="font-bold">
              <td colspan="3" class="py-2 text-right text-gray-700">ยอดสุทธิ</td>
              <td class="py-2 text-right font-mono text-lg text-gray-800" x-text="fmt(inv.total_amount)"></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- Payment summary -->
      <div class="space-y-4">
        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <h3 class="font-semibold text-gray-800 mb-3">ยอดชำระ</h3>
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-gray-500">ยอดเรียกเก็บ</span>
              <span class="font-mono font-medium" x-text="fmt(inv.total_amount)"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-500">ชำระแล้ว</span>
              <span class="font-mono text-green-600" x-text="fmt(inv.paid_amount)"></span>
            </div>
            <div class="flex justify-between border-t border-gray-100 pt-2 font-bold">
              <span>ค้างชำระ</span>
              <span class="font-mono text-lg" :class="inv.balance_due > 0 ? 'text-red-600' : 'text-gray-400'" x-text="fmt(inv.balance_due)"></span>
            </div>
          </div>
        </div>

        <!-- Payment history -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <h3 class="font-semibold text-gray-800 mb-3">ประวัติการรับชำระ</h3>
          <template x-if="!inv.receipts || inv.receipts.length === 0">
            <p class="text-sm text-gray-400">ยังไม่มีรายการชำระ</p>
          </template>
          <template x-for="r in inv.receipts || []" :key="r.id">
            <div class="flex justify-between text-sm border-b border-gray-50 py-2">
              <div>
                <p class="font-medium text-gray-700" x-text="r.receipt_no"></p>
                <p class="text-xs text-gray-400" x-text="r.payment_date"></p>
              </div>
              <span class="font-mono text-green-600" x-text="fmt(r.amount)"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function invDetail(invoiceId) {
  return {
    invoiceId,
    inv: null,
    loading: true,
    async init() {
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      try {
        const r = await fetch('/api/v1/ar/invoices/' + invoiceId, { headers: { Authorization: 'Bearer ' + token } });
        const d = await r.json();
        this.inv = d.data || d;
      } catch { this.inv = null; }
      this.loading = false;
    },
    isOverdue() { return this.inv?.status === 'open' && this.inv.due_date < new Date().toISOString().slice(0,10); },
    statusLabel(s) { return { draft:'แบบร่าง', open:'ค้างชำระ', partial:'บางส่วน', paid:'ชำระแล้ว', voided:'ยกเลิก' }[s] || s; },
    statusClass(s) { return { draft:'bg-gray-100 text-gray-600', open:'bg-blue-100 text-blue-700', partial:'bg-yellow-100 text-yellow-700', paid:'bg-green-100 text-green-700', voided:'bg-red-100 text-red-600' }[s] || ''; },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
