{% extends "base.html" %}
{% block title %}ใบวางบิล{% endblock %}
{% block page_title %}AR — ใบวางบิล #{{ bn_id }}{% endblock %}

{% block content %}
<div x-data="bnDetail({{ bn_id }})" x-init="init()">

  <div class="mb-4 flex items-center justify-between">
    <a href="/ar/billing-notes" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      กลับรายการ
    </a>
    <div class="flex gap-2" x-show="bn && bn.status !== 'cancelled'">
      <a x-show="bn && bn.status === 'draft'" href="#"
        @click.prevent="markSent()"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
        ทำเครื่องหมายว่าส่งแล้ว
      </a>
      <a x-show="bn && bn.status !== 'cancelled'"
        :href="bn ? '/ar/receipts/new?invoice_id=' + (bn.invoice_ids || [])[0] : '#'"
        class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">
        รับชำระเงิน
      </a>
    </div>
  </div>

  <div x-show="successMsg" class="mb-4 bg-green-50 border border-green-200 text-green-700 rounded-xl p-4 text-sm" x-text="successMsg"></div>
  <div x-show="errMsg" class="mb-4 bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-sm" x-text="errMsg"></div>

  <template x-if="loading">
    <div class="bg-white rounded-xl p-8 shadow-sm text-center text-gray-400">
      <svg class="animate-spin w-8 h-8 mx-auto" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>
  </template>

  <template x-if="!loading && bn">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Main card -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <div class="flex items-start justify-between mb-6">
          <div>
            <h2 class="text-2xl font-bold text-gray-800" x-text="bn.billing_note_no"></h2>
            <p class="text-gray-500 mt-1" x-text="bn.contact_name"></p>
          </div>
          <span :class="statusClass(bn.status)" class="px-3 py-1 rounded-full text-sm font-medium" x-text="statusLabel(bn.status)"></span>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6 text-sm">
          <div>
            <p class="text-gray-400 mb-1">วันที่วางบิล</p>
            <p class="font-medium" x-text="bn.billing_date"></p>
          </div>
          <div>
            <p class="text-gray-400 mb-1">ครบกำหนด</p>
            <p class="font-medium" x-text="bn.due_date"></p>
          </div>
          <div>
            <p class="text-gray-400 mb-1">หมายเหตุ</p>
            <p class="font-medium" x-text="bn.description || '—'"></p>
          </div>
        </div>

        <!-- Invoice list -->
        <div>
          <h3 class="font-semibold text-gray-700 mb-3 text-sm">Invoice ในใบวางบิลนี้</h3>
          <template x-if="loadingInvoices">
            <p class="text-sm text-gray-400">กำลังโหลด...</p>
          </template>
          <table class="w-full text-sm" x-show="!loadingInvoices">
            <thead>
              <tr class="border-b border-gray-100 text-gray-500">
                <th class="text-left py-2 font-medium">เลขที่ Invoice</th>
                <th class="text-left py-2 font-medium">วันที่</th>
                <th class="text-left py-2 font-medium">ครบกำหนด</th>
                <th class="text-right py-2 font-medium">ยอดรวม</th>
                <th class="text-right py-2 font-medium">ค้างชำระ</th>
                <th class="text-center py-2 font-medium">สถานะ</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="inv in invoices" :key="inv.id">
                <tr class="border-b border-gray-50 hover:bg-gray-50">
                  <td class="py-2">
                    <a :href="'/ar/invoices/' + inv.id" class="font-mono font-medium text-brand hover:underline" x-text="inv.invoice_no"></a>
                  </td>
                  <td class="py-2 text-gray-600" x-text="inv.invoice_date"></td>
                  <td class="py-2 text-gray-600" x-text="inv.due_date"></td>
                  <td class="py-2 text-right font-mono" x-text="fmt(inv.total_amount)"></td>
                  <td class="py-2 text-right font-mono font-medium text-red-600" x-text="fmt(inv.balance)"></td>
                  <td class="py-2 text-center">
                    <span :class="invStatusClass(inv.status)" class="px-2 py-0.5 rounded-full text-xs font-medium" x-text="invStatusLabel(inv.status)"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Right sidebar -->
      <div class="space-y-4">
        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <h3 class="font-semibold text-gray-800 mb-3">สรุปยอด</h3>
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-gray-500">จำนวน Invoice</span>
              <span class="font-medium" x-text="(bn.invoice_ids || []).length + ' ใบ'"></span>
            </div>
            <div class="flex justify-between border-t border-gray-100 pt-2 font-bold">
              <span>ยอดรวม</span>
              <span class="font-mono text-lg text-gray-800" x-text="fmt(bn.total_amount)"></span>
            </div>
          </div>
        </div>

        <div class="bg-blue-50 rounded-xl p-4 text-sm text-blue-700">
          <p class="font-medium mb-1">หมายเหตุ</p>
          <p class="text-xs leading-relaxed">ใบวางบิลไม่สร้างรายการบัญชี กรุณาใช้ "รับชำระเงิน" เพื่อบันทึกการรับเงิน</p>
        </div>
      </div>
    </div>
  </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function bnDetail(bnId) {
  return {
    bnId,
    bn: null,
    invoices: [],
    loading: true,
    loadingInvoices: false,
    successMsg: '',
    errMsg: '',

    async init() {
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      try {
        const r = await fetch('/api/v1/ar/billing-notes/' + bnId, { headers: { Authorization: 'Bearer ' + token } });
        const d = await r.json();
        this.bn = d.data || d;
        if (this.bn?.invoice_ids?.length) await this.loadInvoiceDetails(token);
      } catch { this.bn = null; }
      this.loading = false;
    },

    async loadInvoiceDetails(token) {
      this.loadingInvoices = true;
      const results = [];
      for (const invId of this.bn.invoice_ids) {
        try {
          const r = await fetch('/api/v1/ar/invoices/' + invId, { headers: { Authorization: 'Bearer ' + token } });
          const d = await r.json();
          results.push(d.data || d);
        } catch {}
      }
      this.invoices = results;
      this.loadingInvoices = false;
    },

    async markSent() {
      // Simple status update — extend when PATCH endpoint is added
      this.successMsg = 'ฟีเจอร์อัปเดตสถานะจะเพิ่มในเวอร์ชันถัดไป';
      setTimeout(() => this.successMsg = '', 3000);
    },

    statusLabel(s) { return { draft:'แบบร่าง', sent:'ส่งแล้ว', cancelled:'ยกเลิก' }[s] || s; },
    statusClass(s) { return { draft:'bg-gray-100 text-gray-600', sent:'bg-blue-100 text-blue-700', cancelled:'bg-red-100 text-red-600' }[s] || 'bg-gray-100 text-gray-600'; },
    invStatusLabel(s) { return { posted:'ค้างชำระ', partially_paid:'ชำระบางส่วน', paid:'ชำระแล้ว', cancelled:'ยกเลิก' }[s] || s; },
    invStatusClass(s) { return { posted:'bg-blue-100 text-blue-700', partially_paid:'bg-yellow-100 text-yellow-700', paid:'bg-green-100 text-green-700', cancelled:'bg-red-100 text-red-600' }[s] || 'bg-gray-100 text-gray-600'; },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
