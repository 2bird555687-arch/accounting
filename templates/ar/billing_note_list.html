{% extends "base.html" %}
{% block title %}ใบวางบิล{% endblock %}
{% block page_title %}AR — ใบวางบิล{% endblock %}

{% block content %}
<div x-data="bnList()" x-init="init()">
  <div class="panel">
    <div class="panel-head">
      <div style="display:flex;gap:8px;align-items:center;">
        <select x-model="filterStatus" @change="load(1)">
          <option value="">ทุกสถานะ</option>
          <option value="draft">แบบร่าง</option>
          <option value="sent">ส่งแล้ว</option>
          <option value="cancelled">ยกเลิก</option>
        </select>
      </div>
      <a href="/ar/billing-notes/new" class="btn btn-primary">+ สร้างใบวางบิล</a>
    </div>

    <div class="panel-body">
      <table>
        <thead>
          <tr>
            <th>เลขที่</th>
            <th>วันที่วางบิล</th>
            <th>ลูกค้า</th>
            <th>ครบกำหนด</th>
            <th class="num">ยอดรวม</th>
            <th style="text-align:center">Invoice</th>
            <th style="text-align:center">สถานะ</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-if="loading">
            <tr><td colspan="8" class="empty">กำลังโหลด...</td></tr>
          </template>
          <template x-if="!loading && items.length === 0">
            <tr><td colspan="8" class="empty">ไม่พบใบวางบิล</td></tr>
          </template>
          <template x-for="bn in items" :key="bn.id">
            <tr>
              <td style="font-family:var(--mono);font-weight:500" x-text="bn.billing_note_no"></td>
              <td x-text="bn.billing_date"></td>
              <td x-text="bn.contact_name"></td>
              <td x-text="bn.due_date"></td>
              <td class="num" x-text="fmt(bn.total_amount)"></td>
              <td style="text-align:center;color:var(--text2);font-size:12px" x-text="(bn.invoice_ids || []).length + ' ใบ'"></td>
              <td style="text-align:center">
                <span class="badge" :class="statusClass(bn.status)" x-text="statusLabel(bn.status)"></span>
              </td>
              <td style="text-align:right">
                <a :href="'/ar/billing-notes/' + bn.id" class="btn btn-ghost btn-sm">ดูรายละเอียด</a>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <div class="panel-head" style="justify-content:space-between;">
      <span style="font-size:12px;color:var(--text2)" x-text="`แสดง ${items.length} จาก ${total} รายการ`"></span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" @click="load(page - 1)" :disabled="page <= 1">ก่อนหน้า</button>
        <button class="btn btn-ghost btn-sm" @click="load(page + 1)" :disabled="page * pageSize >= total">ถัดไป</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function bnList() {
  return {
    items: [], total: 0, loading: true, page: 1, pageSize: 50,
    filterStatus: '',
    async init() { await this.load(1); },
    async load(p) {
      this.loading = true; this.page = p;
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      const params = new URLSearchParams({ page: p, page_size: this.pageSize });
      if (this.filterStatus) params.set('status', this.filterStatus);
      const r = await fetch('/api/v1/ar/billing-notes?' + params, { headers: { Authorization: 'Bearer ' + token } });
      const d = await r.json();
      this.items = d.data?.items || d.items || [];
      this.total = d.data?.total || d.total || 0;
      this.loading = false;
    },
    statusLabel(s) { return { draft:'แบบร่าง', sent:'ส่งแล้ว', cancelled:'ยกเลิก' }[s] || s; },
    statusClass(s) { return { draft:'b-gray', sent:'b-teal', cancelled:'b-red' }[s] || 'b-gray'; },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
