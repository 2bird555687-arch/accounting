{% extends "base.html" %}
{% block title %}ใบวางบิล{% endblock %}
{% block page_title %}AR — ใบวางบิล (Billing Notes){% endblock %}

{% block content %}
<div x-data="bnList()" x-init="init()">

  <div class="mb-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <select x-model="filterStatus" @change="load(1)"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand/40">
        <option value="">ทุกสถานะ</option>
        <option value="draft">แบบร่าง</option>
        <option value="sent">ส่งแล้ว</option>
        <option value="cancelled">ยกเลิก</option>
      </select>
    </div>
    <a href="/ar/billing-notes/new"
      class="px-4 py-2 bg-brand text-white rounded-lg text-sm font-medium hover:bg-brand-dark transition-colors">
      + สร้างใบวางบิล
    </a>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-4 py-3 text-gray-500 font-medium">เลขที่</th>
          <th class="text-left px-4 py-3 text-gray-500 font-medium">วันที่วางบิล</th>
          <th class="text-left px-4 py-3 text-gray-500 font-medium">ลูกค้า</th>
          <th class="text-left px-4 py-3 text-gray-500 font-medium">ครบกำหนด</th>
          <th class="text-right px-4 py-3 text-gray-500 font-medium">ยอดรวม</th>
          <th class="text-center px-4 py-3 text-gray-500 font-medium">Invoice</th>
          <th class="text-center px-4 py-3 text-gray-500 font-medium">สถานะ</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <tr>
            <td colspan="8" class="px-4 py-8 text-center text-gray-400">
              <svg class="animate-spin w-6 h-6 mx-auto" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </td>
          </tr>
        </template>
        <template x-if="!loading && items.length === 0">
          <tr>
            <td colspan="8" class="px-4 py-8 text-center text-gray-400">ไม่พบใบวางบิล</td>
          </tr>
        </template>
        <template x-for="bn in items" :key="bn.id">
          <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
            <td class="px-4 py-3 font-mono font-medium text-gray-800" x-text="bn.billing_note_no"></td>
            <td class="px-4 py-3 text-gray-600" x-text="bn.billing_date"></td>
            <td class="px-4 py-3 text-gray-700" x-text="bn.contact_name"></td>
            <td class="px-4 py-3 text-gray-600" x-text="bn.due_date"></td>
            <td class="px-4 py-3 text-right font-mono text-gray-800" x-text="fmt(bn.total_amount)"></td>
            <td class="px-4 py-3 text-center text-gray-500 text-xs" x-text="(bn.invoice_ids || []).length + ' ใบ'"></td>
            <td class="px-4 py-3 text-center">
              <span :class="statusClass(bn.status)" class="px-2 py-0.5 rounded-full text-xs font-medium" x-text="statusLabel(bn.status)"></span>
            </td>
            <td class="px-4 py-3 text-right">
              <a :href="'/ar/billing-notes/' + bn.id" class="text-brand hover:underline text-xs">ดูรายละเอียด</a>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-between text-sm text-gray-500">
      <span x-text="`แสดง ${items.length} จาก ${total} รายการ`"></span>
      <div class="flex gap-2">
        <button @click="load(page - 1)" :disabled="page <= 1"
          class="px-3 py-1 border border-gray-200 rounded-lg disabled:opacity-40 hover:bg-gray-50">ก่อนหน้า</button>
        <button @click="load(page + 1)" :disabled="page * pageSize >= total"
          class="px-3 py-1 border border-gray-200 rounded-lg disabled:opacity-40 hover:bg-gray-50">ถัดไป</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function bnList() {
  return {
    items: [], total: 0, loading: true, page: 1, pageSize: 50,
    filterStatus: '',
    async init() { await this.load(1); },
    async load(p) {
      this.loading = true; this.page = p;
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      const params = new URLSearchParams({ page: p, page_size: this.pageSize });
      if (this.filterStatus) params.set('status', this.filterStatus);
      const r = await fetch('/api/v1/ar/billing-notes?' + params, { headers: { Authorization: 'Bearer ' + token } });
      const d = await r.json();
      this.items = d.data?.items || d.items || [];
      this.total = d.data?.total || d.total || 0;
      this.loading = false;
    },
    statusLabel(s) { return { draft:'แบบร่าง', sent:'ส่งแล้ว', cancelled:'ยกเลิก' }[s] || s; },
    statusClass(s) { return { draft:'bg-gray-100 text-gray-600', sent:'bg-blue-100 text-blue-700', cancelled:'bg-red-100 text-red-600' }[s] || 'bg-gray-100 text-gray-600'; },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
