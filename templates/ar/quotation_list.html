{% extends "base.html" %}
{% block title %}ใบเสนอราคา{% endblock %}
{% block page_title %}AR — ใบเสนอราคา{% endblock %}

{% block content %}
<div x-data="qtList()" x-init="init()">
  <div class="panel">
    <div class="panel-head">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" placeholder="ค้นหา..." x-model="search" @input.debounce.400ms="load(1)" style="width:200px;" />
        <select x-model="filterStatus" @change="load(1)">
          <option value="">ทุกสถานะ</option>
          <option value="draft">แบบร่าง</option>
          <option value="sent">ส่งแล้ว</option>
          <option value="accepted">ยอมรับแล้ว</option>
          <option value="rejected">ปฏิเสธ</option>
          <option value="converted">แปลงเป็น Invoice แล้ว</option>
          <option value="expired">หมดอายุ</option>
        </select>
      </div>
      <a href="/ar/quotations/new" class="btn btn-primary">+ สร้างใบเสนอราคา</a>
    </div>

    <div class="panel-body">
      <table>
        <thead>
          <tr>
            <th>เลขที่</th>
            <th>วันที่</th>
            <th>ลูกค้า</th>
            <th>ใช้ได้ถึง</th>
            <th class="num">ยอดรวม</th>
            <th style="text-align:center">สถานะ</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-if="loading">
            <tr><td colspan="7" class="empty">กำลังโหลด...</td></tr>
          </template>
          <template x-if="!loading && items.length === 0">
            <tr><td colspan="7" class="empty">ไม่พบใบเสนอราคา</td></tr>
          </template>
          <template x-for="q in items" :key="q.id">
            <tr>
              <td style="font-family:var(--mono);font-weight:500" x-text="q.quotation_no"></td>
              <td x-text="q.quotation_date"></td>
              <td x-text="q.contact_name"></td>
              <td :style="q.is_expired && q.status === 'sent' ? 'color:var(--red)' : ''" x-text="q.valid_until"></td>
              <td class="num" x-text="fmt(q.total_amount)"></td>
              <td style="text-align:center">
                <span class="badge" :class="statusClass(q.status)" x-text="statusLabel(q.status)"></span>
              </td>
              <td style="text-align:right">
                <a :href="'/ar/quotations/' + q.id" class="btn btn-ghost btn-sm">ดูรายละเอียด</a>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <div class="panel-head" style="justify-content:space-between;">
      <span style="font-size:12px;color:var(--text2)" x-text="`แสดง ${items.length} จาก ${total} รายการ`"></span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" @click="load(page - 1)" :disabled="page <= 1">ก่อนหน้า</button>
        <button class="btn btn-ghost btn-sm" @click="load(page + 1)" :disabled="page * pageSize >= total">ถัดไป</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function qtList() {
  return {
    items: [], total: 0, loading: true, page: 1, pageSize: 50,
    search: '', filterStatus: '',
    async init() { await this.load(1); },
    async load(p) {
      this.loading = true; this.page = p;
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      const params = new URLSearchParams({ page: p, page_size: this.pageSize });
      if (this.filterStatus) params.set('status', this.filterStatus);
      const r = await fetch('/api/v1/ar/quotations?' + params, { headers: { Authorization: 'Bearer ' + token } });
      const d = await r.json();
      this.items = d.data?.items || d.items || [];
      this.total = d.data?.total || d.total || 0;
      this.loading = false;
    },
    statusLabel(s) {
      return { draft:'แบบร่าง', sent:'ส่งแล้ว', accepted:'ยอมรับแล้ว', rejected:'ปฏิเสธ', converted:'แปลงเป็น INV แล้ว', expired:'หมดอายุ' }[s] || s;
    },
    statusClass(s) {
      return { draft:'b-gray', sent:'b-teal', accepted:'b-green', rejected:'b-red', converted:'b-purple', expired:'b-amber' }[s] || 'b-gray';
    },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
