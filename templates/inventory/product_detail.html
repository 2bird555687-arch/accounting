{% extends "base.html" %}
{% block title %}รายละเอียดสินค้า{% endblock %}
{% block page_title %}สินค้า/คลัง — รายละเอียดสินค้า{% endblock %}

{% block content %}
<div x-data="productDetail({{ product_id }})" x-init="init()">

  <a href="/inventory/products" class="text-sm text-blue-600">← กลับรายการสินค้า</a>

  <template x-if="p">
    <div class="mt-3">
      <!-- Header card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
        <div class="flex items-start justify-between">
          <div>
            <h2 class="text-xl font-bold text-gray-800" x-text="p.name"></h2>
            <p class="font-mono text-blue-600" x-text="p.sku"></p>
            <span class="mt-2 inline-flex px-2 py-0.5 rounded-full text-xs font-medium"
              :class="p.cost_method === 'fifo' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'"
              x-text="p.cost_method === 'fifo' ? 'FIFO' : 'ถัวเฉลี่ย'"></span>
          </div>
          <div class="flex gap-2">
            <button @click="openReceive()" class="px-3 py-2 rounded-lg text-sm font-medium bg-green-100 text-green-700">📥 รับเข้า</button>
            <button @click="openIssue()" class="px-3 py-2 rounded-lg text-sm font-medium bg-orange-100 text-orange-700">📤 เบิกออก</button>
          </div>
        </div>
        <div class="grid grid-cols-4 gap-4 mt-4">
          <div><p class="text-xs text-gray-500">หน่วย</p><p class="font-medium" x-text="p.unit"></p></div>
          <div><p class="text-xs text-gray-500">ต้นทุนปัจจุบัน</p><p class="font-medium font-mono" x-text="fmt(p.current_cost)"></p></div>
          <div><p class="text-xs text-gray-500">คงเหลือ</p><p class="font-medium font-mono" x-text="fmt(p.quantity_on_hand)"></p></div>
          <div><p class="text-xs text-gray-500">มูลค่ารวม</p><p class="font-medium font-mono" x-text="fmt(p.total_value)"></p></div>
        </div>
      </div>

      <!-- Lots (FIFO) -->
      <div x-show="p.cost_method === 'fifo'" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-4">
        <div class="px-4 py-3 border-b border-gray-100 font-medium text-gray-700">Lot คงเหลือ (FIFO)</div>
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="text-left px-4 py-2 font-medium text-gray-600">Lot</th>
              <th class="text-left px-4 py-2 font-medium text-gray-600">วันที่รับ</th>
              <th class="text-right px-4 py-2 font-medium text-gray-600">รับเข้า</th>
              <th class="text-right px-4 py-2 font-medium text-gray-600">คงเหลือ</th>
              <th class="text-right px-4 py-2 font-medium text-gray-600">ต้นทุน/หน่วย</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="lots.length === 0"><tr><td colspan="5" class="px-4 py-4 text-center text-gray-400">ไม่มี lot คงเหลือ</td></tr></template>
            <template x-for="l in lots" :key="l.id">
              <tr class="border-b border-gray-50">
                <td class="px-4 py-2 font-mono" x-text="l.lot_no"></td>
                <td class="px-4 py-2 text-gray-600" x-text="l.received_date"></td>
                <td class="px-4 py-2 text-right font-mono" x-text="fmt(l.quantity)"></td>
                <td class="px-4 py-2 text-right font-mono font-medium" x-text="fmt(l.remaining_qty)"></td>
                <td class="px-4 py-2 text-right font-mono" x-text="fmt(l.unit_cost)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Movements -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100 font-medium text-gray-700">ความเคลื่อนไหวล่าสุด</div>
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="text-left px-4 py-2 font-medium text-gray-600">เลขที่</th>
              <th class="text-left px-4 py-2 font-medium text-gray-600">วันที่</th>
              <th class="text-center px-4 py-2 font-medium text-gray-600">ประเภท</th>
              <th class="text-right px-4 py-2 font-medium text-gray-600">จำนวน</th>
              <th class="text-right px-4 py-2 font-medium text-gray-600">ต้นทุนรวม</th>
              <th class="text-right px-4 py-2 font-medium text-gray-600">คงเหลือ</th>
              <th class="text-left px-4 py-2 font-medium text-gray-600">JE</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="m in movements" :key="m.id">
              <tr class="border-b border-gray-50">
                <td class="px-4 py-2 font-mono" x-text="m.movement_no"></td>
                <td class="px-4 py-2 text-gray-600" x-text="m.movement_date"></td>
                <td class="px-4 py-2 text-center"><span class="inline-flex px-2 py-0.5 rounded-full text-xs" :class="typeClass(m.movement_type)" x-text="typeLabel(m.movement_type)"></span></td>
                <td class="px-4 py-2 text-right font-mono" x-text="fmt(m.quantity)"></td>
                <td class="px-4 py-2 text-right font-mono" x-text="fmt(m.total_cost)"></td>
                <td class="px-4 py-2 text-right font-mono" x-text="fmt(m.qty_after)"></td>
                <td class="px-4 py-2 font-mono text-xs text-blue-600" x-text="m.journal_entry_no || '—'"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Receive Modal -->
  <div x-show="showReceive" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="showReceive=false">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
      <h2 class="text-lg font-bold mb-4">รับสินค้าเข้าคลัง</h2>
      <div class="space-y-3">
        <div><label class="block text-xs text-gray-500 mb-1">วันที่</label>
          <input type="date" x-model="rcv.movement_date" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs text-gray-500 mb-1">จำนวน</label>
            <input type="number" x-model="rcv.quantity" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
          <div><label class="block text-xs text-gray-500 mb-1">ต้นทุน/หน่วย</label>
            <input type="number" x-model="rcv.unit_cost" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
        </div>
        <div><label class="block text-xs text-gray-500 mb-1">อ้างอิง</label>
          <input x-model="rcv.reference" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
        <p x-show="error" x-text="error" class="text-sm text-red-600"></p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="showReceive=false" class="px-4 py-2 rounded-lg border border-gray-200 text-sm">ยกเลิก</button>
        <button @click="doReceive()" class="px-4 py-2 rounded-lg bg-green-600 text-white text-sm">รับเข้า</button>
      </div>
    </div>
  </div>

  <!-- Issue Modal -->
  <div x-show="showIssue" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="showIssue=false">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
      <h2 class="text-lg font-bold mb-4">เบิกสินค้าออก</h2>
      <div class="space-y-3">
        <div><label class="block text-xs text-gray-500 mb-1">วันที่</label>
          <input type="date" x-model="iss.movement_date" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
        <div><label class="block text-xs text-gray-500 mb-1">จำนวน</label>
          <input type="number" x-model="iss.quantity" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
        <div><label class="block text-xs text-gray-500 mb-1">อ้างอิง</label>
          <input x-model="iss.reference" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/></div>
        <p class="text-xs text-gray-400">คงเหลือปัจจุบัน: <span x-text="p ? fmt(p.quantity_on_hand) : ''"></span> <span x-text="p ? p.unit : ''"></span></p>
        <p x-show="error" x-text="error" class="text-sm text-red-600"></p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="showIssue=false" class="px-4 py-2 rounded-lg border border-gray-200 text-sm">ยกเลิก</button>
        <button @click="doIssue()" class="px-4 py-2 rounded-lg bg-orange-600 text-white text-sm">เบิกออก</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function productDetail(pid) {
  return {
    pid, p: null, lots: [], movements: [], error: '',
    showReceive: false, showIssue: false,
    rcv: {}, iss: {},
    today: '{{ today }}',
    token() { return document.cookie.match(/access_token=([^;]+)/)?.[1] || ''; },
    hdr() { return { Authorization: 'Bearer ' + this.token() }; },
    async init() { await this.loadAll(); },
    async loadAll() {
      try {
        const r = await fetch('/api/v1/inv/products/' + this.pid, { headers: this.hdr() });
        this.p = await r.json();
        const lr = await fetch('/api/v1/inv/stock/lots/' + this.pid, { headers: this.hdr() });
        this.lots = await lr.json();
        const mr = await fetch('/api/v1/inv/movements?product_id=' + this.pid, { headers: this.hdr() });
        this.movements = await mr.json();
      } catch (e) { this.error = String(e); }
    },
    openReceive() { this.error=''; this.rcv = { movement_date: this.today, quantity: 0, unit_cost: this.p?.current_cost || 0, reference:'' }; this.showReceive = true; },
    openIssue() { this.error=''; this.iss = { movement_date: this.today, quantity: 0, reference:'' }; this.showIssue = true; },
    async doReceive() {
      this.error = '';
      try {
        const r = await fetch('/api/v1/inv/movements/receive', {
          method:'POST', headers:{'Content-Type':'application/json', ...this.hdr()},
          body: JSON.stringify({ product_id: this.pid, ...this.rcv }),
        });
        if (!r.ok) { const d = await r.json(); this.error = d.detail || 'ไม่สำเร็จ'; return; }
        this.showReceive = false; await this.loadAll();
      } catch (e) { this.error = String(e); }
    },
    async doIssue() {
      this.error = '';
      try {
        const r = await fetch('/api/v1/inv/movements/issue', {
          method:'POST', headers:{'Content-Type':'application/json', ...this.hdr()},
          body: JSON.stringify({ product_id: this.pid, ...this.iss }),
        });
        if (!r.ok) { const d = await r.json(); this.error = d.detail || 'ไม่สำเร็จ'; return; }
        this.showIssue = false; await this.loadAll();
      } catch (e) { this.error = String(e); }
    },
    typeLabel(t) { return { receive:'รับเข้า', issue:'เบิกออก', adjust_in:'ปรับเพิ่ม', adjust_out:'ปรับลด' }[t] || t; },
    typeClass(t) { return (t==='receive'||t==='adjust_in') ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'; },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
