{% extends "base.html" %}
{% block title %}รายการสินค้า{% endblock %}
{% block page_title %}สินค้า/คลัง — รายการสินค้า{% endblock %}

{% block content %}
<div x-data="productList()" x-init="init()">

  <!-- Toolbar -->
  <div class="flex items-center gap-3 mb-4 flex-wrap">
    <div class="relative flex-1 min-w-[200px] max-w-sm">
      <input type="text" x-model="search" placeholder="ค้นหา รหัส / ชื่อสินค้า..."
        class="w-full pl-3 pr-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <button @click="openCreate()"
      class="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1"
      style="background:var(--accent-l);color:var(--accent);border:1px solid var(--accent);">
      ➕ เพิ่มสินค้า
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-4 py-3 font-medium text-gray-600">รหัส</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">ชื่อ</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">วิธีตีราคา</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">หน่วย</th>
          <th class="text-right px-4 py-3 font-medium text-gray-600">ต้นทุน</th>
          <th class="text-right px-4 py-3 font-medium text-gray-600">คงเหลือ</th>
          <th class="text-right px-4 py-3 font-medium text-gray-600">มูลค่ารวม</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">กำลังโหลด...</td></tr>
        </template>
        <template x-if="!loading && filtered().length === 0">
          <tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">ไม่พบสินค้า</td></tr>
        </template>
        <template x-for="p in filtered()" :key="p.id">
          <tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer"
              @click="window.location='/inventory/products/'+p.id">
            <td class="px-4 py-3 font-mono text-blue-600 font-medium" x-text="p.sku"></td>
            <td class="px-4 py-3 text-gray-700">
              <span x-text="p.name"></span>
              <span x-show="Number(p.quantity_on_hand) <= Number(p.min_stock)"
                class="ml-2 inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-600">ใกล้หมด</span>
            </td>
            <td class="px-4 py-3 text-center">
              <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium"
                :class="p.cost_method === 'fifo' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'"
                x-text="p.cost_method === 'fifo' ? 'FIFO' : 'ถัวเฉลี่ย'"></span>
            </td>
            <td class="px-4 py-3 text-center text-gray-600" x-text="p.unit"></td>
            <td class="px-4 py-3 text-right font-mono" x-text="fmt(p.current_cost)"></td>
            <td class="px-4 py-3 text-right font-mono font-medium" x-text="fmt(p.quantity_on_hand)"></td>
            <td class="px-4 py-3 text-right font-mono" x-text="fmt(p.total_value)"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Create Modal -->
  <div x-show="showCreate" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
       @click.self="showCreate=false">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
      <h2 class="text-lg font-bold mb-4">เพิ่มสินค้าใหม่</h2>
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">รหัสสินค้า (SKU)</label>
            <input x-model="form.sku" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">หน่วย</label>
            <input x-model="form.unit" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">ชื่อสินค้า</label>
          <input x-model="form.name" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">วิธีตีราคาทุน (costing method)</label>
          <select x-model="form.cost_method" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
            <option value="average">ถัวเฉลี่ยถ่วงน้ำหนัก (Average)</option>
            <option value="fifo">เข้าก่อนออกก่อน (FIFO)</option>
          </select>
          <p class="text-xs text-gray-400 mt-1"
             x-text="form.cost_method === 'fifo' ? 'ตัดต้นทุนตาม lot ที่รับเข้าก่อน' : 'คำนวณต้นทุนเฉลี่ยใหม่ทุกครั้งที่รับเข้า'"></p>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">ต้นทุนมาตรฐาน</label>
            <input type="number" x-model="form.standard_cost" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">บัญชีสินค้าคงเหลือ</label>
            <input x-model="form.inventory_account" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">บัญชีต้นทุนขาย</label>
            <input x-model="form.cogs_account" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">จุดสั่งซื้อ</label>
            <input type="number" x-model="form.reorder_point" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">สต็อกขั้นต่ำ</label>
            <input type="number" x-model="form.min_stock" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm"/>
          </div>
        </div>
        <p x-show="error" x-text="error" class="text-sm text-red-600"></p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="showCreate=false" class="px-4 py-2 rounded-lg border border-gray-200 text-sm">ยกเลิก</button>
        <button @click="save()" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm">บันทึก</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function productList() {
  return {
    items: [], loading: false, search: '', showCreate: false, error: '',
    form: {},
    token() { return document.cookie.match(/access_token=([^;]+)/)?.[1] || ''; },
    async init() { await this.load(); },
    async load() {
      this.loading = true;
      try {
        const r = await fetch('/api/v1/inv/products', { headers: { Authorization: 'Bearer ' + this.token() } });
        this.items = await r.json();
      } catch { this.items = []; }
      this.loading = false;
    },
    filtered() {
      const s = this.search.toLowerCase();
      if (!s) return this.items;
      return this.items.filter(p => (p.sku||'').toLowerCase().includes(s) || (p.name||'').toLowerCase().includes(s));
    },
    openCreate() {
      this.error = '';
      this.form = { sku:'', name:'', unit:'ชิ้น', cost_method:'average',
        inventory_account:'1130', cogs_account:'5101',
        standard_cost:0, reorder_point:0, min_stock:0 };
      this.showCreate = true;
    },
    async save() {
      this.error = '';
      try {
        const r = await fetch('/api/v1/inv/products', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + this.token() },
          body: JSON.stringify(this.form),
        });
        if (!r.ok) { const d = await r.json(); this.error = d.detail || 'บันทึกไม่สำเร็จ'; return; }
        this.showCreate = false;
        await this.load();
      } catch (e) { this.error = String(e); }
    },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
