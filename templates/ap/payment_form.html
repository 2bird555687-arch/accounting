{% extends "base.html" %}
{% block title %}จ่ายชำระเงิน{% endblock %}
{% block page_title %}AP — จ่ายชำระเงิน{% endblock %}

{% block content %}
<div x-data="paymentForm({{ purchase_id or 'null' }})" x-init="init()">

  <div class="mb-4">
    <a href="/ap/purchases" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      กลับรายการ
    </a>
  </div>

  <div class="max-w-xl mx-auto">
    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
      <h2 class="font-semibold text-gray-800 mb-5">บันทึกจ่ายชำระเงิน</h2>

      <div x-show="purchaseInfo" class="mb-5 p-3 bg-orange-50 rounded-lg text-sm">
        <div class="flex justify-between">
          <span class="text-gray-600">ใบซื้อ</span>
          <span class="font-mono font-medium text-orange-700" x-text="purchaseInfo?.purchase_no"></span>
        </div>
        <div class="flex justify-between mt-1">
          <span class="text-gray-600">ค้างจ่าย</span>
          <span class="font-mono font-bold text-red-600" x-text="fmt(purchaseInfo?.balance_due)"></span>
        </div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ใบซื้อ (Purchase ID)</label>
          <input type="number" x-model.number="form.purchase_id" @change="loadPurchase()"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">วันที่จ่าย</label>
          <input type="date" x-model="form.payment_date"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">จำนวนเงิน</label>
          <input type="number" x-model.number="form.amount" step="0.01" min="0"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">วิธีชำระเงิน</label>
          <select x-model="form.payment_method"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="cash">เงินสด</option>
            <option value="transfer">โอนเงิน</option>
            <option value="cheque">เช็ค</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">อ้างอิง</label>
          <input type="text" x-model="form.reference" placeholder="เลขที่โอน / เช็ค..."
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div x-show="error" class="p-3 bg-red-50 rounded-lg text-red-600 text-sm" x-text="error"></div>
        <div x-show="success" class="p-3 bg-green-50 rounded-lg text-green-600 text-sm">บันทึกสำเร็จ!</div>

        <button @click="save()" :disabled="saving || !form.purchase_id || !form.amount"
          class="w-full py-2.5 bg-orange-600 text-white rounded-lg font-medium hover:bg-orange-700 disabled:opacity-50">
          <span x-text="saving ? 'กำลังบันทึก...' : 'ยืนยันจ่ายชำระเงิน'"></span>
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function paymentForm(initPurchaseId) {
  const today = new Date().toISOString().slice(0, 10);
  return {
    form: { purchase_id: initPurchaseId, payment_date: today, amount: 0, payment_method: 'transfer', reference: '' },
    purchaseInfo: null,
    saving: false, error: '', success: false,

    async init() { if (initPurchaseId) await this.loadPurchase(); },

    async loadPurchase() {
      if (!this.form.purchase_id) return;
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      try {
        const r = await fetch('/api/v1/ap/purchases/' + this.form.purchase_id, { headers: { Authorization: 'Bearer ' + token } });
        const d = await r.json();
        this.purchaseInfo = d.data || d;
        if (this.purchaseInfo?.balance_due) this.form.amount = this.purchaseInfo.balance_due;
      } catch { this.purchaseInfo = null; }
    },

    async save() {
      this.saving = true; this.error = ''; this.success = false;
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      try {
        const r = await fetch('/api/v1/ap/payments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify(this.form),
        });
        if (!r.ok) { const e = await r.json(); this.error = e.detail || 'เกิดข้อผิดพลาด'; }
        else { this.success = true; setTimeout(() => window.location = '/ap/purchases', 1500); }
      } catch { this.error = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์'; }
      this.saving = false;
    },

    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
