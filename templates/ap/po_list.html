{% extends "base.html" %}
{% block title %}ใบสั่งซื้อ (PO){% endblock %}
{% block page_title %}AP — ใบสั่งซื้อ (PO){% endblock %}

{% block content %}
<div x-data="poList()" x-init="init()">

  <div class="flex items-center gap-3 mb-4">
    <div class="relative flex-1 max-w-sm">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" x-model="search" @input.debounce.400ms="load()" placeholder="ค้นหาเลขที่ PO / ผู้ขาย..."
        class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <select x-model="status" @change="load()" class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">ทุกสถานะ</option>
      <option value="draft">แบบร่าง</option>
      <option value="approved">อนุมัติ</option>
      <option value="received">รับแล้ว</option>
      <option value="cancelled">ยกเลิก</option>
    </select>
    <button @click="newPO()" class="px-4 py-2 bg-blue-700 text-white rounded-lg text-sm font-medium hover:bg-blue-800 flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      ออก PO ใหม่
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-4 py-3 font-medium text-gray-600">เลขที่ PO</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">ผู้ขาย</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">วันที่</th>
          <th class="text-left px-4 py-3 font-medium text-gray-600">วันส่งของ</th>
          <th class="text-right px-4 py-3 font-medium text-gray-600">มูลค่า</th>
          <th class="text-center px-4 py-3 font-medium text-gray-600">สถานะ</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="loading">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">
            <svg class="animate-spin w-6 h-6 mx-auto" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </td></tr>
        </template>
        <template x-if="!loading && items.length === 0">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">ไม่พบรายการ PO</td></tr>
        </template>
        <template x-for="p in items" :key="p.id">
          <tr class="border-b border-gray-50 hover:bg-gray-50">
            <td class="px-4 py-3 font-mono text-blue-600 font-medium" x-text="p.po_no"></td>
            <td class="px-4 py-3 text-gray-700" x-text="p.contact_name"></td>
            <td class="px-4 py-3 text-gray-600" x-text="p.po_date"></td>
            <td class="px-4 py-3 text-gray-600" x-text="p.delivery_date || '—'"></td>
            <td class="px-4 py-3 text-right font-mono" x-text="fmt(p.total_amount)"></td>
            <td class="px-4 py-3 text-center">
              <span :class="statusClass(p.status)" class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium" x-text="statusLabel(p.status)"></span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <div class="px-4 py-3 border-t border-gray-100 text-sm text-gray-500" x-text="items.length + ' รายการ'"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function poList() {
  return {
    search: '', status: '', items: [], loading: false,
    async init() { await this.load(); },
    async load() {
      this.loading = true;
      const token = document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
      const params = new URLSearchParams();
      if (this.search) params.set('q', this.search);
      if (this.status) params.set('status', this.status);
      try {
        const r = await fetch('/api/v1/ap/purchase-orders?' + params);
        const d = await r.json();
        this.items = d.items || d.data || d || [];
      } catch { this.items = []; }
      this.loading = false;
    },
    newPO() { alert('ฟีเจอร์ออก PO ใหม่ (Modal/Form)'); },
    statusLabel(s) { return { draft:'แบบร่าง', approved:'อนุมัติ', received:'รับแล้ว', cancelled:'ยกเลิก' }[s] || s; },
    statusClass(s) { return { draft:'bg-gray-100 text-gray-600', approved:'bg-blue-100 text-blue-700', received:'bg-green-100 text-green-700', cancelled:'bg-red-100 text-red-600' }[s] || ''; },
    fmt(v) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 }).format(v || 0); },
  };
}
</script>
{% endblock %}
