{% extends "base.html" %}
{% block title %}งบประมาณ vs จริง{% endblock %}
{% block page_title %}รายงาน — งบประมาณ vs จริง{% endblock %}

{% block content %}
<!-- Toast notification -->
<div x-data="budgetPage()"
     x-init="period='{{ default_year }}-{{ '%02d' % default_month }}'; init()">

  <!-- Toast -->
  <div x-show="toast"
       x-transition
       style="display:none;"
       class="fixed top-4 right-4 z-50 bg-white border border-gray-200 shadow-lg rounded-xl px-5 py-3 text-sm text-gray-800"
       x-text="toast">
  </div>

  <!-- Filter bar -->
  <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4 flex items-center gap-3 flex-wrap">
    <div class="flex items-center gap-2">
      <label class="text-sm font-medium text-gray-700">งวด</label>
      <input type="month" x-model="period"
             class="px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <button @click="load()"
            class="px-4 py-2 bg-blue-700 text-white rounded-lg text-sm font-medium hover:bg-blue-800">
      แสดง
    </button>
    <div class="flex gap-2">
      <a :href="exportUrl('excel')"
         class="px-3 py-2 border border-gray-300 text-gray-600 rounded-lg text-sm hover:bg-gray-50">
        Excel
      </a>
      <a :href="exportUrl('pdf')"
         class="px-3 py-2 border border-gray-300 text-gray-600 rounded-lg text-sm hover:bg-gray-50">
        PDF
      </a>
    </div>
    <button @click="showBudgetPanel=!showBudgetPanel"
            class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm font-medium hover:bg-blue-50">
      ✏️ ตั้งงบประมาณ
    </button>
  </div>

  <!-- Budget panel -->
  <div x-show="showBudgetPanel"
       x-transition
       style="display:none;"
       class="bg-white rounded-xl p-5 shadow-sm border border-blue-100 mb-4">
    <h3 class="text-sm font-semibold text-gray-700 mb-3">ตั้ง / แก้ไข งบประมาณ</h3>
    <div class="flex items-end gap-3 flex-wrap mb-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500">รหัสบัญชี</label>
        <input type="text" x-model="budgetForm.account_code" placeholder="เช่น 5101"
               class="px-3 py-2 rounded-lg border border-gray-200 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500">จำนวนงบ</label>
        <input type="number" x-model="budgetForm.amount" placeholder="0.00"
               class="px-3 py-2 rounded-lg border border-gray-200 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <button @click="submitBudgetForm()"
              :disabled="saving"
              class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50">
        <span x-show="saving">กำลังบันทึก…</span>
        <span x-show="!saving">บันทึก</span>
      </button>
    </div>

    <!-- Current budget lines inline-edit table -->
    <template x-if="report && report.lines && report.lines.length > 0">
      <div class="overflow-x-auto">
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
              <th class="px-3 py-2 text-left font-medium">รหัส</th>
              <th class="px-3 py-2 text-left font-medium">ชื่อบัญชี</th>
              <th class="px-3 py-2 text-right font-medium">งบประมาณ (คลิกเพื่อแก้ไข)</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="line in report.lines" :key="line.account_code">
              <tr class="border-t border-gray-100 hover:bg-gray-50">
                <td class="px-3 py-2 font-mono text-gray-600" x-text="line.account_code"></td>
                <td class="px-3 py-2 text-gray-700" x-text="line.account_name"></td>
                <td class="px-3 py-2 text-right">
                  <input x-show="isEditing(line.account_code)"
                         x-model="editingBudget[line.account_code]"
                         @keydown.enter="commitEditBudget(line)"
                         @blur="commitEditBudget(line)"
                         type="number"
                         class="w-36 border border-blue-300 rounded px-2 py-1 text-right text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                  <span x-show="!isEditing(line.account_code)"
                        @click="startEditBudget(line)"
                        class="cursor-pointer hover:underline font-mono text-gray-800"
                        x-text="fmt(line.budget)">
                  </span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
  </div>

  <!-- Loading spinner -->
  <template x-if="loading">
    <div class="bg-white rounded-xl p-8 text-center text-gray-400 shadow-sm border border-gray-100">
      <svg class="animate-spin w-8 h-8 mx-auto" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>
  </template>

  <!-- Error banner -->
  <div x-show="error"
       style="display:none;"
       class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-5 py-3 mb-4 text-sm"
       x-text="error">
  </div>

  <!-- Empty state -->
  <template x-if="!loading && report && report.lines.length === 0">
    <div class="bg-white rounded-xl p-10 text-center shadow-sm border border-gray-100">
      <p class="text-gray-500 text-sm mb-2">ยังไม่มีข้อมูลงบประมาณสำหรับงวดนี้</p>
      <p class="text-gray-400 text-xs">กด ✏️ ตั้งงบประมาณ เพื่อเริ่มตั้งงบ</p>
    </div>
  </template>

  <!-- Summary cards + Table (only when lines > 0) -->
  <template x-if="!loading && report && report.lines.length > 0">
    <div>
      <!-- Summary cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <p class="text-xs text-gray-500 mb-1">งบประมาณรวม</p>
          <p class="text-lg font-bold font-mono text-gray-800" x-text="fmt(report.total_budget)"></p>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <p class="text-xs text-gray-500 mb-1">ค่าจริงรวม</p>
          <p class="text-lg font-bold font-mono text-gray-800" x-text="fmt(report.total_actual)"></p>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <p class="text-xs text-gray-500 mb-1">ส่วนต่างรวม</p>
          <p class="text-lg font-bold font-mono"
             :class="parseFloat(report.total_variance) > 0 ? 'text-red-600' : 'text-green-700'"
             x-text="fmt(report.total_variance)"></p>
        </div>
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <p class="text-xs text-gray-500 mb-1">รายการเกินงบ</p>
          <p class="text-lg font-bold">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-sm font-bold"
                  :class="report.over_budget_count > 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'"
                  x-text="report.over_budget_count + ' รายการ'">
            </span>
          </p>
        </div>
      </div>

      <!-- Report table -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-100">
          <h2 class="font-semibold text-gray-800"
              x-text="'งบประมาณ vs จริง: งวด ' + report.period"></h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                <th class="px-4 py-3 text-left font-medium">รหัส</th>
                <th class="px-4 py-3 text-left font-medium">ชื่อบัญชี</th>
                <th class="px-4 py-3 text-left font-medium">หมวด</th>
                <th class="px-4 py-3 text-right font-medium">งบประมาณ</th>
                <th class="px-4 py-3 text-right font-medium">จริง</th>
                <th class="px-4 py-3 text-right font-medium">ส่วนต่าง</th>
                <th class="px-4 py-3 text-right font-medium">%</th>
                <th class="px-4 py-3 text-center font-medium">สถานะ</th>
              </tr>
            </thead>

            <template x-for="[cat, lines] in Object.entries(groupedLines)" :key="cat">
              <tbody>
                <tr class="bg-gray-100">
                  <td colspan="8" class="px-4 py-2 font-semibold text-sm text-gray-700" x-text="cat"></td>
                </tr>
                <template x-for="line in lines" :key="line.account_code">
                  <tr :class="line.over_budget ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-gray-50'"
                      class="border-t border-gray-100">
                    <td class="px-4 py-2.5 font-mono text-gray-600 text-xs" x-text="line.account_code"></td>
                    <td class="px-4 py-2.5 text-gray-800" x-text="line.account_name"></td>
                    <td class="px-4 py-2.5 text-gray-500 text-xs" x-text="line.category"></td>
                    <td class="px-4 py-2.5 text-right font-mono text-gray-800" x-text="fmt(line.budget)"></td>
                    <td class="px-4 py-2.5 text-right font-mono text-gray-800" x-text="fmt(line.actual)"></td>
                    <td class="px-4 py-2.5 text-right font-mono" :class="varClass(line)" x-text="fmt(line.variance)"></td>
                    <td class="px-4 py-2.5 text-right text-gray-600" x-text="fmtPct(line.variance_pct)"></td>
                    <td class="px-4 py-2.5 text-center">
                      <span x-show="line.over_budget"
                            class="inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-red-100 text-red-700">
                        ⚠️ เกินงบ
                      </span>
                      <span x-show="!line.over_budget"
                            class="inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700">
                        ✓ ปกติ
                      </span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </template>

            <!-- Total row -->
            <tfoot>
              <tr class="bg-gray-50 border-t-2 border-gray-300 font-bold">
                <td colspan="3" class="px-4 py-3 text-gray-700">รวมทั้งหมด</td>
                <td class="px-4 py-3 text-right font-mono text-gray-800" x-text="fmt(report.total_budget)"></td>
                <td class="px-4 py-3 text-right font-mono text-gray-800" x-text="fmt(report.total_actual)"></td>
                <td class="px-4 py-3 text-right font-mono"
                    :class="parseFloat(report.total_variance) > 0 ? 'text-red-600' : 'text-green-700'"
                    x-text="fmt(report.total_variance)"></td>
                <td class="px-4 py-3"></td>
                <td class="px-4 py-3"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </template>

</div>
{% endblock %}

{% block scripts %}
<script>
function budgetPage() {
  return {
    // Filter state
    period: new Date().toISOString().slice(0, 7),
    loading: false,
    report: null,
    error: '',

    // Budget panel
    showBudgetPanel: false,
    budgetForm: { account_code: '', amount: '' },
    saving: false,
    toast: '',
    editingBudget: {},

    token() {
      return document.cookie.match(/access_token=([^;]+)/)?.[1] || '';
    },

    get year() { return parseInt(this.period.split('-')[0]); },
    get month() { return parseInt(this.period.split('-')[1]); },

    fmt(v) {
      if (v == null) return '0.00';
      return parseFloat(v).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    fmtPct(v) {
      return parseFloat(v || 0).toFixed(1) + '%';
    },

    get apiBase() {
      return `/api/v1/reports/budget-actual/${this.year}/${this.month}`;
    },

    get postBase() {
      return `/api/v1/reports/budget/${this.year}/${this.month}`;
    },

    get groupedLines() {
      if (!this.report) return {};
      return this.report.lines.reduce((acc, line) => {
        if (!acc[line.category]) acc[line.category] = [];
        acc[line.category].push(line);
        return acc;
      }, {});
    },

    async load() {
      this.loading = true;
      this.error = '';
      this.report = null;
      try {
        const r = await fetch(this.apiBase, {
          headers: { Authorization: 'Bearer ' + this.token() }
        });
        const d = await r.json();
        if (r.ok) {
          this.report = d;
        } else {
          this.error = d.detail || 'โหลดรายงานไม่สำเร็จ';
        }
      } catch (e) {
        this.error = 'เกิดข้อผิดพลาด: ' + e.message;
      }
      this.loading = false;
    },

    exportUrl(fmt) {
      return `${this.apiBase}?fmt=${fmt}`;
    },

    async saveBudget(account_code, amount) {
      if (!account_code || amount === '' || amount == null) return false;
      const r = await fetch(this.postBase, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + this.token()
        },
        body: JSON.stringify({ account_code, amount: parseFloat(amount) })
      });
      const d = await r.json();
      if (r.ok) {
        this.toast = `✅ บันทึกงบบัญชี ${account_code} สำเร็จ`;
        setTimeout(() => { this.toast = ''; }, 3000);
        await this.load();
        return true;
      } else {
        alert(d.detail || 'บันทึกไม่สำเร็จ');
        return false;
      }
    },

    async submitBudgetForm() {
      this.saving = true;
      await this.saveBudget(this.budgetForm.account_code, this.budgetForm.amount);
      this.budgetForm = { account_code: '', amount: '' };
      this.saving = false;
    },

    startEditBudget(line) {
      this.editingBudget = { ...this.editingBudget, [line.account_code]: line.budget };
    },

    async commitEditBudget(line) {
      const val = this.editingBudget[line.account_code];
      if (val !== undefined && val !== '') {
        await this.saveBudget(line.account_code, val);
      }
      const updated = { ...this.editingBudget };
      delete updated[line.account_code];
      this.editingBudget = updated;
    },

    isEditing(code) {
      return this.editingBudget[code] !== undefined;
    },

    varClass(line) {
      const v = parseFloat(line.variance);
      if (v > 0) return 'text-red-600 font-medium';
      if (v < 0) return 'text-green-600';
      return 'text-gray-600';
    },

    async init() {
      await this.load();
    }
  };
}
</script>
{% endblock %}
