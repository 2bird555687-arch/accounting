user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upload size ───────────────────────────────────────────────────────────
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:1m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream acccloud_app {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → redirect to HTTPS (commented out until SSL is configured) ──────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl http2;
        server_name _;

        # ── SSL (uncomment after running Certbot) ──────────────────────────
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 1d;
        # add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Security headers ───────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Static files (served directly, no app round-trip) ─────────────
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── API rate limiting ──────────────────────────────────────────────
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_conn conn_limit 10;
            proxy_pass http://acccloud_app;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            limit_conn conn_limit 20;
            proxy_pass http://acccloud_app;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── OCR / file upload (larger timeout) ────────────────────────────
        location /api/v1/ocr/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://acccloud_app;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Web UI + everything else ───────────────────────────────────────
        location / {
            proxy_pass http://acccloud_app;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Health check (no logs) ─────────────────────────────────────────
        location /api/v1/health {
            proxy_pass http://acccloud_app;
            access_log off;
        }

        # ── Error pages ────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
